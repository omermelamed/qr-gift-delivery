name: Apply database migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply idempotent schema patches
        # Migrations 004 and 006 were marked as applied in the history before
        # their SQL actually ran against the DB. All statements here are safe
        # to re-run on every workflow execution.
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          SQL=$(cat << 'ENDSQL'
          ALTER TABLE companies ADD COLUMN IF NOT EXISTS logo_url TEXT;
          ALTER TABLE companies ADD COLUMN IF NOT EXISTS sms_template TEXT;
          ALTER TABLE companies ADD COLUMN IF NOT EXISTS theme_color TEXT;
          INSERT INTO storage.buckets (id, name, public)
            VALUES ('qr-codes', 'qr-codes', true)
            ON CONFLICT (id) DO NOTHING;
          DO $$ BEGIN
            CREATE POLICY "qr_codes_public_read" ON storage.objects
              FOR SELECT USING (bucket_id = 'qr-codes');
          EXCEPTION WHEN duplicate_object THEN NULL;
          END $$;
          DO $$ BEGIN
            CREATE POLICY "qr_codes_service_insert" ON storage.objects
              FOR INSERT WITH CHECK (bucket_id = 'qr-codes');
          EXCEPTION WHEN duplicate_object THEN NULL;
          END $$;
          INSERT INTO storage.buckets (id, name, public)
            VALUES ('logos', 'logos', true)
            ON CONFLICT (id) DO NOTHING;
          DO $$ BEGIN
            CREATE POLICY "logos_public_read" ON storage.objects
              FOR SELECT USING (bucket_id = 'logos');
          EXCEPTION WHEN duplicate_object THEN NULL;
          END $$;
          DO $$ BEGIN
            CREATE POLICY "logos_service_insert" ON storage.objects
              FOR INSERT WITH CHECK (bucket_id = 'logos');
          EXCEPTION WHEN duplicate_object THEN NULL;
          END $$;
          DO $$ BEGIN
            CREATE POLICY "logos_service_update" ON storage.objects
              FOR UPDATE USING (bucket_id = 'logos');
          EXCEPTION WHEN duplicate_object THEN NULL;
          END $$;
          ALTER TABLE employees ALTER COLUMN phone DROP NOT NULL;
          ALTER TABLE employees ADD COLUMN IF NOT EXISTS user_id UUID REFERENCES auth.users(id) ON DELETE SET NULL;
          CREATE UNIQUE INDEX IF NOT EXISTS employees_company_user_idx
            ON employees (company_id, user_id)
            WHERE user_id IS NOT NULL;
          INSERT INTO role_permissions (role_id, permission_id)
            SELECT r.id, p.id FROM roles r, permissions p
            WHERE r.name = 'company_admin' AND p.name = 'tokens:scan'
            ON CONFLICT DO NOTHING;
          INSERT INTO role_permissions (role_id, permission_id)
            SELECT r.id, p.id FROM roles r, permissions p
            WHERE r.name = 'campaign_manager' AND p.name = 'tokens:scan'
            ON CONFLICT DO NOTHING;
          ALTER TABLE campaigns ADD COLUMN IF NOT EXISTS scheduled_at TIMESTAMPTZ;
          ENDSQL
          )
          PAYLOAD=$(jq -n --arg q "$SQL" '{"query": $q}')
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Sync migration history
        # The Supabase CLI stores only the numeric timestamp prefix (e.g.
        # "20240101000001") as the version, not the full filename. We
        # delete any stale/wrong-format records and insert just the timestamps
        # for all migrations already applied to the DB, so db push only runs
        # genuinely new ones.
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          SQL=$(cat << 'ENDSQL'
          CREATE SCHEMA IF NOT EXISTS supabase_migrations;
          CREATE TABLE IF NOT EXISTS supabase_migrations.schema_migrations (
            version text NOT NULL PRIMARY KEY
          );
          DELETE FROM supabase_migrations.schema_migrations
          WHERE version NOT IN (
            '20240101000001',
            '20240101000002',
            '20240101000003',
            '20240101000004',
            '20240101000005',
            '20240101000006',
            '20240101000007',
            '20240101000008',
            '20240101000009',
            '20240501000010',
            '20240501000011',
            '20240501000012',
            '20240501000013',
            '20240501000014',
            '20240502000015'
          );
          INSERT INTO supabase_migrations.schema_migrations (version) VALUES
            ('20240101000001'),
            ('20240101000002'),
            ('20240101000003'),
            ('20240101000004'),
            ('20240101000005'),
            ('20240101000006'),
            ('20240101000007'),
            ('20240101000008'),
            ('20240101000009')
          ON CONFLICT (version) DO NOTHING;
          ENDSQL
          )
          PAYLOAD=$(jq -n --arg q "$SQL" '{"query": $q}')
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Apply new migrations
        run: supabase db push --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
