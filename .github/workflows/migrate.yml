name: Apply database migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Sync migration history
        # Clears any stale records not matching local files, then marks
        # 20240101000001-20240101000006 as already applied so db push only
        # applies the genuinely new migrations (007-009).
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          SQL=$(cat << 'ENDSQL'
          CREATE SCHEMA IF NOT EXISTS supabase_migrations;
          CREATE TABLE IF NOT EXISTS supabase_migrations.schema_migrations (
            version text NOT NULL PRIMARY KEY
          );
          DELETE FROM supabase_migrations.schema_migrations
          WHERE version NOT IN (
            '20240101000001_initial_schema',
            '20240101000002_rls_policies',
            '20240101000003_seed_roles_permissions',
            '20240101000004_storage_bucket',
            '20240101000005_admin_columns',
            '20240101000006_company_settings',
            '20240101000007_campaign_close',
            '20240101000008_campaign_distributors',
            '20240101000009_employees_directory'
          );
          INSERT INTO supabase_migrations.schema_migrations (version) VALUES
            ('20240101000001_initial_schema'),
            ('20240101000002_rls_policies'),
            ('20240101000003_seed_roles_permissions'),
            ('20240101000004_storage_bucket'),
            ('20240101000005_admin_columns'),
            ('20240101000006_company_settings')
          ON CONFLICT (version) DO NOTHING;
          ENDSQL
          )
          PAYLOAD=$(jq -n --arg q "$SQL" '{"query": $q}')
          curl -sf -X POST \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Apply new migrations
        run: supabase db push --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
